<div class="post-card">

    <div class="post-top">

        <img
            class="avatar"
            [src]="post.avatar"
            alt="avatar">

        <div class="user-info">

            <div class="author">

                {{ post.author }}

            </div>

            <div class="date">

                {{ post.date }}

            </div>

        </div>

    </div>

    <div class="post-text">

        {{ post.text }}

    </div>

    <div class="image-wrapper">

    <img
        class="post-image"
        [src]="post.image"
        alt="post">

    @if(showComments){

        <div class="comments-popup">

            <input
    type="text"
    [(ngModel)]="newComment"
    (keyup.enter)="addComment()"
    placeholder="Напишите комментарий...">

            <div class="comments-list">

                @for(comment of post.comments.slice(0, visibleComments); track $index){

                    <div class="comment-item">

    <img
        class="comment-avatar"
        [src]="comment.avatar"
        alt="avatar">

    <div class="comment-content">

        <div class="comment-author">

            {{ comment.author }}

        </div>

        <div class="comment-text">

            {{ comment.text }}

        </div>

    </div>

</div>

                }

            </div>

            @if(post.comments.length > visibleComments){

<button
    (click)="visibleComments = post.comments.length">

    +{{ post.comments.length - visibleComments }}

</button>

}

        </div>

    }



    <div class="post-bottom">

        <div
    class="action"
    [class.liked]="liked"
    (click)="toggleLike()">

    <span

    class="heart">

    @if(!liked){

<svg class="icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">

    <path d="M20.84 4.61a5.5 5.5 0 0 0-7.78 0L12 5.67l-1.06-1.06a5.5 5.5 0 0 0-7.78 7.78L12 21.23l8.84-8.84a5.5 5.5 0 0 0 0-7.78z"/>

</svg>

}

@else{

<svg class="icon" viewBox="0 0 24 24" fill="currentColor">

    <path d="M12 21.35l-1.45-1.32C5.4 15.36 2 12.28 2 8.5 2 5.42 4.42 3 7.5 3c1.74 0 3.41.81 4.5 2.09C13.09 3.81 14.76 3 16.5 3 19.58 3 22 5.42 22 8.5c0 3.78-3.4 6.86-8.55 11.54z"/>

</svg>

}

</span>

    <span>

        {{ likes }}

    </span>

</div>

        <div
    class="action"
    (click)="toggleComments()">

    <svg
    class="icon"
    viewBox="0 0 24 24"
    fill="none"
    stroke="currentColor"
    stroke-width="2">

    <path d="M21 12c0 4.4-4 8-9 8-1.2 0-2.4-.2-3.5-.7L3 21l1.8-4C4.3 15.8 4 13.9 4 12c0-4.4 4-8 9-8s9 3.6 9 8z"/>

</svg>

    <span>

        {{ post.comments.length }}

    </span>

</div>

    </div>

</div>
