<div class="card">

    <div class="post-header">

        <div class="avatar"></div>

        <div class="user-info">
            <div class="author">{{ post.author }}</div>
            <div class="date">{{ post.date }}</div>
        </div>

    </div>

    <div class="post-text">
        {{ post.text }}
    </div>

    @if (post.comments.length > 0) {

        <div class="comments">

            @for (comment of post.comments; track $index) {

                <div class="comment">
                    {{ comment }}
                </div>

            }

        </div>

    }

</div>
