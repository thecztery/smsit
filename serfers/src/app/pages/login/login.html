
<div class="page">

    <div class="login-card">

        <h2>Авторизация</h2>

        <label>Почта</label>

        <input
    type="email"
    [(ngModel)]="email"
    placeholder="example@mail.com"
    title="Введите адрес электронной почты.">

        <div class="or">или</div>

        <label class="nickname-label">Псевдоним</label>

        <input
    type="text"
    [(ngModel)]="username"
    placeholder="Ivan111"
    title="Введите ваш псевдоним.">

        <label>Пароль</label>

        <input
    type="password"
    [(ngModel)]="password"
    placeholder="********"
    title="От 6 до 20 символов. Латиница, цифры и подчёркивания.">

        <button>
            Войти
        </button>

    </div>

</div>
