<app-header></app-header>

<div class="page">

    <div class="register-card">

        <h2>Регистрация</h2>

        <label>Почта</label>

        <input
            type="email"
            [(ngModel)]="email"
            placeholder="example@mail.com">

        <label>Псевдоним</label>

        <input
            type="text"
            [(ngModel)]="username"
            placeholder="Ivan111">

        <label>Пароль</label>

        <input
            type="password"
            [(ngModel)]="password">

        <label>Повторите пароль</label>

        <input
            type="password"
            [(ngModel)]="repeatPassword">

        <button>
            Зарегистрироваться
        </button>

    </div>

</div>
